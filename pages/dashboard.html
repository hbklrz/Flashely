<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Dashboard — Flashely</title>
<link rel="icon" href="/favicon.png"/>
<link rel="stylesheet" href="/fl.css"/>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.js"></script>
<style>
.srv-card{background:var(--s2);border:1px solid var(--bd2);border-radius:var(--r10);padding:18px;cursor:pointer;transition:all 200ms;display:flex;flex-direction:column;gap:12px}
.srv-card:hover{border-color:var(--pr);transform:translateY(-2px);box-shadow:0 8px 24px rgba(129,140,248,.12)}
.srv-card:active{transform:none}
.srv-card-top{display:flex;align-items:center;gap:10px}
.srv-avatar{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;flex-shrink:0}
.srv-info{flex:1;min-width:0}
.srv-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.srv-entry{font-size:11.5px;color:var(--fg2);font-family:var(--mono)}
.srv-res{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.srv-res-item{background:var(--s3);border-radius:8px;padding:8px 10px}
.srv-res-lbl{font-size:10px;color:var(--fg2);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.srv-res-val{font-size:12px;font-weight:700}
.srv-ctrl{display:flex;gap:6px;margin-top:4px}
.page-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.page-h1{font-size:22px;font-weight:800;letter-spacing:-.4px}
.page-sub{font-size:13px;color:var(--fg2);margin-top:3px}
.dash-topbar{background:var(--s1);border-bottom:1px solid var(--bd2);padding:0 20px;height:54px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:40}
.brand-ico-sm{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,rgba(129,140,248,.25),rgba(129,140,248,.08));border:1px solid rgba(129,140,248,.25);display:flex;align-items:center;justify-content:center;color:var(--pr)}
.brand-ico-sm svg{width:15px;height:15px}
.search-box{display:flex;align-items:center;gap:8px;background:var(--s3);border:1px solid var(--bd);border-radius:99px;padding:0 14px;height:36px;flex:1;max-width:320px}
.search-box input{flex:1;background:none;border:none;font-size:13px;color:var(--fg)}
.search-box svg{width:15px;height:15px;color:var(--fg2);flex-shrink:0}
.online-count{background:var(--ok-bg);color:var(--ok);font-size:11px;font-weight:700;padding:2px 8px;border-radius:99px}
</style>
</head>
<body>
<div class="dash-topbar">
  <div class="brand-ico-sm"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></div>
  <div style="flex:1"><span style="font-size:15px;font-weight:800;letter-spacing:-.3px">Flashely</span></div>
  <div class="search-box">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="search-inp" placeholder="Search servers..." oninput="filterServers(this.value)"/>
  </div>
  <button class="btn bf btn-sm" onclick="document.getElementById('create-modal').classList.add('open')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    New
  </button>
  <button class="btn bg btn-ico btn-sm" id="theme-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></button>
  <button class="btn bg btn-ico btn-sm" onclick="doLogout()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
</div>

<div class="page" style="padding-top:24px;max-width:1360px;margin:0 auto">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px">
    <div>
      <div style="font-size:22px;font-weight:800;letter-spacing:-.4px">Servers</div>
      <div class="muted text-sm mt-1">Select a server to manage it</div>
    </div>
    <div class="row gap-2">
      <span class="online-count" id="online-badge">0 online</span>
      <button class="btn bo btn-sm" onclick="loadServers()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="23 4 23 10 17 10"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
        Refresh
      </button>
    </div>
  </div>
  <div id="srv-grid" class="ga">
    <div class="skel" style="height:180px;border-radius:18px"></div>
    <div class="skel" style="height:180px;border-radius:18px"></div>
    <div class="skel" style="height:180px;border-radius:18px"></div>
  </div>
</div>

<!-- Create modal -->
<div class="overlay" id="create-modal">
  <div class="modal">
    <div class="modal-hd">
      <div style="font-size:17px;font-weight:800">New Server</div>
      <button class="btn bg btn-ico btn-sm" onclick="document.getElementById('create-modal').classList.remove('open')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="col gap-4">
      <div class="fld"><label class="lbl">Server Name *</label><input id="new-name" class="inp" placeholder="my-discord-bot"/></div>
      <div class="fld"><label class="lbl">Entry File</label><input id="new-entry" class="inp mono" value="index.js"/></div>
      <div class="fld"><label class="lbl">Git Repository <span class="muted text-xs">(optional)</span></label><input id="new-git" class="inp mono" placeholder="https://github.com/user/repo.git"/></div>
      <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-top:1px solid var(--bd2)">
        <div><div class="semi" style="font-size:13.5px">Auto-install npm packages</div><div class="muted text-xs mt-1">Run npm install after creation</div></div>
        <label class="tgl"><input type="checkbox" id="new-npm" checked/><div class="tgl-track"><div class="tgl-thumb"></div></div></label>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;padding-bottom:16px">
        <div><div class="semi" style="font-size:13.5px">Start automatically</div><div class="muted text-xs mt-1">Launch after creation</div></div>
        <label class="tgl"><input type="checkbox" id="new-start"/><div class="tgl-track"><div class="tgl-thumb"></div></div></label>
      </div>
      <button class="btn bf btn-lg w-full" style="border-radius:12px" onclick="createServer()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        Deploy Server
      </button>
    </div>
  </div>
</div>

<div class="toast-root"></div>
<style>.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:600;backdrop-filter:blur(4px);align-items:flex-end;justify-content:center}@media(min-width:600px){.overlay{align-items:center}}.overlay.open{display:flex}.modal{background:var(--s2);border:1px solid var(--bd2);border-radius:20px 20px 0 0;padding:24px;width:100%;max-width:480px;max-height:90dvh;overflow-y:auto}@media(min-width:600px){.modal{border-radius:20px}}.modal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}</style>
<script src="/fl.js"></script>
<script>
Flashely.applyTheme(Flashely.theme);
document.getElementById('theme-btn').onclick = () => { Flashely.applyTheme(Flashely.theme==='dark'?'light':'dark'); };

const COLORS=['#818CF8','#34D399','#F87171','#FBBF24','#60A5FA','#E879F9','#2DD4BF','#FB923C'];
function getColor(n){let h=0;for(let c of n)h=c.charCodeAt(0)+((h<<5)-h);return COLORS[Math.abs(h)%COLORS.length];}

let allApps = [];

async function loadServers() {
  const grid = document.getElementById('srv-grid');
  const res = await Flashely.api('/list-apps');
  allApps = Array.isArray(res) ? res : [];
  renderServers(allApps);
  const online = allApps.filter(a => a.App?.Status === 'online' || a.App?.Status === 'running').length;
  document.getElementById('online-badge').textContent = online + ' online';
}

function renderServers(apps) {
  const grid = document.getElementById('srv-grid');
  if (!apps.length) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg><div class="empty-t">No servers yet</div><div class="empty-d">Create your first server to get started</div></div>`;
    return;
  }
  grid.innerHTML = apps.map(app => {
    const name = app.App?.Name || '?';
    const st = app.App?.Status || 'offline';
    const cpu = app.CPU || 0;
    const mem = Flashely.bytes(app.Memory || 0);
    const color = getColor(name);
    const stMap = {online:'b-on',running:'b-on',offline:'b-off',stopped:'b-off',errored:'b-off',starting:'b-start'};
    const stLbl = {online:'Online',running:'Running',offline:'Offline',stopped:'Stopped',errored:'Errored',starting:'Starting'};
    const badgeCls = stMap[st] || 'b-idle';
    const cpuW = Math.min(100, cpu);
    const cpuC = cpu > 85 ? 'err' : cpu > 60 ? 'warn' : 'ok';
    return `<div class="srv-card" onclick="enterServer(${JSON.stringify(JSON.stringify(app))})">
      <div class="srv-card-top">
        <div class="srv-avatar" style="background:${color}18;color:${color}">${name[0].toUpperCase()}</div>
        <div class="srv-info">
          <div class="srv-name">${name}</div>
          <div class="srv-entry">${app.App?.Entry || 'index.js'}</div>
        </div>
        <span class="badge ${badgeCls}">${stLbl[st] || st}</span>
      </div>
      <div class="srv-res">
        <div class="srv-res-item"><div class="srv-res-lbl">CPU</div><div class="srv-res-val ${cpu>85?'err':cpu>60?'warn':''}">${cpu}%</div><div class="pbar mt-1"><div class="pbar-fill ${cpuC}" style="width:${cpuW}%"></div></div></div>
        <div class="srv-res-item"><div class="srv-res-lbl">Memory</div><div class="srv-res-val">${mem}</div></div>
      </div>
      <div class="srv-ctrl" onclick="event.stopPropagation()">
        <button class="btn bs btn-sm" onclick="quickAction('start','${name}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="5 3 19 12 5 21 5 3"/></svg> Start</button>
        <button class="btn bw btn-sm" onclick="quickAction('restart','${name}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="23 4 23 10 17 10"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg> Restart</button>
        <button class="btn bd-btn btn-sm" onclick="quickAction('stop','${name}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/></svg> Stop</button>
      </div>
    </div>`;
  }).join('');
}

function filterServers(q) {
  const f = q.toLowerCase();
  renderServers(allApps.filter(a => (a.App?.Name||'').toLowerCase().includes(f)));
}

function enterServer(appJson) {
  const app = JSON.parse(appJson);
  Flashely.setServer({
    name: app.App?.Name, status: app.App?.Status,
    entry: app.App?.Entry, pid: app.App?.Pid,
    cpu: app.CPU, memory: app.Memory,
    uptime: app.App?.Uptime || 0, created: app.App?.Created,
  });
  window.location.href = '/console';
}

async function quickAction(action, name) {
  const res = await Flashely.api(`/${action}/${name}`, {method:'POST', body:{}});
  Flashely.toast(res.Message || (res.Success ? `${action} sent` : 'Failed'), res.Success ? 'success' : 'error');
  setTimeout(loadServers, 1500);
}

async function createServer() {
  const name = document.getElementById('new-name').value.trim();
  const entry = document.getElementById('new-entry').value.trim() || 'index.js';
  const git = document.getElementById('new-git').value.trim();
  if (!name) { Flashely.toast('Enter a server name','warning'); return; }
  if (!/^[a-zA-Z0-9_\-]+$/.test(name)) { Flashely.toast('Name: letters, numbers, - and _ only','error'); return; }
  const r1 = await Flashely.api('/create_app', {method:'POST', body:{name, main_entry:entry}});
  if (!r1.Success) { Flashely.toast(r1.Message||'Failed to create','error'); return; }
  Flashely.toast('Server created!','success');
  if (git) { await Flashely.api('/git_clone', {method:'POST', body:{url:git, folder:name}}); }
  if (document.getElementById('new-npm').checked) await Flashely.api(`/npm_install/${name}`);
  if (document.getElementById('new-start').checked) await Flashely.api(`/start/${name}`, {method:'POST', body:{}});
  document.getElementById('create-modal').classList.remove('open');
  loadServers();
}

async function doLogout() {
  await Flashely.api('/logout');
  window.location.href = '/login';
}

loadServers();
setInterval(loadServers, 5000);
</script>
</body>
</html>
