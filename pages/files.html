<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Files — Flashely</title>
<link rel="icon" href="/favicon.png"/>
<link rel="stylesheet" href="/fl.css"/>
<link rel="stylesheet" href="/codemirror.css"/>
<link rel="stylesheet" href="/dracula.css"/>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.js"></script>
<style>
.files-layout{display:grid;grid-template-columns:1fr;gap:14px}
.editor-panel{display:none;background:var(--s1);border:1px solid var(--bd);border-radius:var(--r10);overflow:hidden;flex-direction:column}
.editor-panel.open{display:flex}
.editor-head{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--s2);border-bottom:1px solid var(--bd);flex-shrink:0}
.editor-file{font-family:var(--mono);font-size:12.5px;font-weight:600;color:var(--fg);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.editor-body{flex:1;min-height:300px;max-height:500px;overflow:hidden}
.CodeMirror{height:100%!important;min-height:300px!important}
.srv-ctrl-bar{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.upload-area{border:2px dashed var(--bd);border-radius:var(--r8);padding:24px;text-align:center;cursor:pointer;transition:all var(--t2)}
.upload-area:hover,.upload-area.drag{border-color:var(--pr);background:rgba(129,140,248,.05)}
@media(min-width:1024px){.files-layout{grid-template-columns:1fr;gap:0}}
</style>
</head>
<body>
<div class="shell">
<div class="shell-aside"><aside class="aside" id="aside">
  <div class="aside-brand"><div class="brand-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></div><div class="brand-text"><div class="brand-name">Flashely</div><div class="brand-sub">Hyfo Technology</div></div></div>
  <div class="aside-nav" id="aside-nav"></div>
  <div class="aside-foot"><button class="aside-toggle" id="aside-toggle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg><span class="aside-toggle-lbl">Collapse</span></button></div>
</aside></div>
<div class="shell-body">
  <div class="topbar"><div><div class="tb-title" id="tb-title">Files</div></div><div class="row gap-2"><button class="btn bg btn-ico btn-sm" id="theme-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/></svg></button></div></div>
  <div class="ctx-bar" id="ctx-bar"></div>
  <div class="shell-content"><div class="page">

    <!-- Controls -->
    <div class="srv-ctrl-bar">
      <button class="btn bs btn-sm" onclick="srvAction('start')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="width:13px;height:13px"><polygon points="5 3 19 12 5 21 5 3"/></svg> Start</button>
      <button class="btn bw btn-sm" onclick="srvAction('restart')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="width:13px;height:13px"><polyline points="23 4 23 10 17 10"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg> Restart</button>
      <button class="btn bd-btn btn-sm" onclick="srvAction('stop')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="width:13px;height:13px"><rect x="3" y="3" width="18" height="18" rx="2"/></svg> Stop</button>
    </div>

    <!-- File manager card -->
    <div class="card mb-4">
      <!-- Toolbar -->
      <div class="c-hd mb-3">
        <div class="c-ico ci-y"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg></div>
        <div class="c-title" id="fm-title">Files</div>
        <div class="ml-a row gap-2">
          <button class="btn bg btn-sm" onclick="newFile()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="width:13px;height:13px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> File</button>
          <button class="btn bg btn-sm" onclick="newFolder()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="width:13px;height:13px"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg> Folder</button>
          <label class="btn bg btn-sm" style="cursor:pointer">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="width:13px;height:13px"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg> Upload
            <input type="file" id="upload-inp" style="display:none" multiple onchange="uploadFiles(this.files)"/>
          </label>
        </div>
      </div>
      <!-- Path breadcrumb -->
      <div class="fm-path mb-3" id="fm-path"></div>
      <!-- Search -->
      <div class="inp-grp mb-3">
        <div class="inp-pre"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>
        <input class="inp has-pre" id="fm-search" placeholder="Search files..." oninput="filterFiles(this.value)"/>
      </div>
      <!-- Selected actions bar -->
      <div id="sel-bar" class="row gap-2 mb-3" style="display:none">
        <span class="text-sm muted" id="sel-count">0 selected</span>
        <button class="btn bd-btn btn-sm" onclick="deleteSelected()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="width:13px"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg> Delete</button>
        <button class="btn bg btn-sm ml-a" onclick="clearSelection()">Clear</button>
      </div>
      <!-- File list -->
      <div id="fm-list" style="border-radius:var(--r4);overflow:hidden;border:1px solid var(--bd2)">
        <div class="skel" style="height:200px;border-radius:var(--r4)"></div>
      </div>
    </div>

    <!-- Code editor -->
    <div class="card editor-panel" id="editor-panel">
      <div class="editor-head">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="width:16px;height:16px;color:var(--pr);flex-shrink:0"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <span class="editor-file" id="editor-filename">untitled</span>
        <div class="row gap-2 ml-a">
          <button class="btn bt btn-sm" onclick="saveFile()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="width:13px"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/></svg> Save</button>
          <button class="btn bg btn-ico btn-sm" onclick="closeEditor()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
        </div>
      </div>
      <div class="editor-body" id="editor-body"></div>
    </div>

  </div></div>
</div></div>
<div class="bnav" id="bnav"></div>
<div class="drawer-bg" id="drawer-bg"></div>
<div class="drawer" id="drawer"></div>
<div class="toast-root"></div>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.js"></script>
<script src="/codemirror.js"></script>
<script src="/fl.js"></script>
<script>
Flashely.init('files');
const srv = Flashely.requireServer();
if (!srv) throw new Error('no server');
const srvName = srv.name;

let curPath = `bots/${srvName}`;
let allFiles = [];
let selected = new Set();
let editor = null;
let editorPath = '';

// File icons
function fileIcon(name, isDir) {
  if (isDir) return ['dir','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>'];
  const ext = name.split('.').pop().toLowerCase();
  const map = {
    js:['js','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>'],
    ts:['js','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>'],
    py:['py','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>'],
    json:['json','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>'],
    md:['md','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/></svg>'],
    zip:['zip','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 8l-9-6-9 6v10a2 2 0 002 2h14a2 2 0 002-2V8z"/></svg>'],
    png:['img','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>'],
    jpg:['img','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>'],
    env:['file','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="8" cy="15" r="5"/><path d="M15.09 10.72L21 4.81"/></svg>'],
  };
  return map[ext] || ['file','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>'];
}

function buildPath() {
  const parts = curPath.replace('bots/'+srvName,'').split('/').filter(Boolean);
  const rootLabel = srvName;
  let html = `<div class="fm-seg" onclick="navTo('bots/${srvName}')">${rootLabel}</div>`;
  let accumulated = 'bots/'+srvName;
  parts.forEach(p => {
    accumulated += '/'+p;
    const accCopy = accumulated;
    html += `<span class="fm-sep">/</span><div class="fm-seg" onclick="navTo('${accCopy}')">${p}</div>`;
  });
  document.getElementById('fm-path').innerHTML = html;
  document.getElementById('fm-title').textContent = parts.length ? parts[parts.length-1] : srvName;
}

function navTo(path) {
  curPath = path; selected.clear(); updateSelBar();
  loadDir();
}

async function loadDir() {
  const list = document.getElementById('fm-list');
  list.innerHTML = '<div class="skel" style="height:120px;border-radius:8px"></div>';
  buildPath();
  const res = await Flashely.api(`/dirs?path=${encodeURIComponent(curPath)}`);
  if (!res.Success) { list.innerHTML = `<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><div class="empty-t">Error</div><div class="empty-d">${res.Message||'Failed to load'}</div></div>`; return; }
  allFiles = (res.Data || []).sort((a,b) => {
    if (a.isDirectory && !b.isDirectory) return -1;
    if (!a.isDirectory && b.isDirectory) return 1;
    return a.Name.localeCompare(b.Name);
  });
  renderFiles(allFiles);
}

function renderFiles(files) {
  if (!files.length) {
    document.getElementById('fm-list').innerHTML = '<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg><div class="empty-t">Empty folder</div></div>';
    return;
  }
  const html = files.map(f => {
    const [iconCls, iconSvg] = fileIcon(f.Name, f.isDirectory);
    const path = curPath + '/' + f.Name;
    const size = f.Stats?.size ? Flashely.bytes(f.Stats.size) : (f.isDirectory ? 'dir' : '—');
    const sel = selected.has(path);
    return `<div class="fm-row${sel?' sel':''}" id="fr-${btoa(path).replace(/=/g,'')}">
      <div class="fm-tick${sel?' on':''}" onclick="toggleSel(event,'${path}','${btoa(path).replace(/=/g,'')}')"></div>
      <div class="fm-ico ${iconCls}">${iconSvg}</div>
      <div class="fm-name" onclick="${f.isDirectory?`navTo('${path}')`:`openFile('${path}','${f.Name}')`}">
        <strong>${f.Name}</strong>
        <span>${size}</span>
      </div>
      <div class="fm-meta no-mobile">${Flashely.ago(f.Stats?.mtime)}</div>
      <div class="fm-acts">
        ${!f.isDirectory?`<button class="btn bg btn-ico btn-sm" onclick="openFile('${path}','${f.Name}')" title="Edit"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="width:13px;height:13px"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>`:''}
        <button class="btn bg btn-ico btn-sm" onclick="renameItem('${path}','${f.Name}')" title="Rename"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="width:13px;height:13px"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg></button>
        ${!f.isDirectory?`<a class="btn bg btn-ico btn-sm" href="/file?path=${encodeURIComponent(path)}" download title="Download"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="width:13px;height:13px"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></a>`:''}
        <button class="btn bd-btn btn-ico btn-sm" onclick="deleteItem('${path}','${f.Name}')" title="Delete"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="width:13px;height:13px"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg></button>
      </div>
    </div>`;
  }).join('');
  document.getElementById('fm-list').innerHTML = html;
}

function filterFiles(q) {
  renderFiles(allFiles.filter(f => f.Name.toLowerCase().includes(q.toLowerCase())));
}

function toggleSel(e, path, encoded) {
  e.stopPropagation();
  if (selected.has(path)) selected.delete(path);
  else selected.add(path);
  const row = document.getElementById('fr-'+encoded);
  if (row) {
    row.classList.toggle('sel', selected.has(path));
    row.querySelector('.fm-tick').classList.toggle('on', selected.has(path));
  }
  updateSelBar();
}
function clearSelection() { selected.clear(); renderFiles(allFiles); updateSelBar(); }
function updateSelBar() {
  const bar = document.getElementById('sel-bar');
  bar.style.display = selected.size ? 'flex' : 'none';
  document.getElementById('sel-count').textContent = selected.size + ' selected';
}

async function openFile(path, name) {
  const res = await Flashely.api(`/file_content?path=${encodeURIComponent(path)}`);
  if (!res.Success) { Flashely.toast(res.Message||'Failed to open','error'); return; }
  editorPath = path;
  document.getElementById('editor-filename').textContent = name;
  document.getElementById('editor-panel').classList.add('open');
  if (!editor) {
    editor = CodeMirror(document.getElementById('editor-body'), { theme:'dracula', lineNumbers:true, lineWrapping:false, indentWithTabs:false, tabSize:2 });
  }
  const ext = name.split('.').pop().toLowerCase();
  const modeMap = {js:'javascript',ts:'javascript',json:'javascript',py:'python',html:'xml',css:'css',md:'markdown',sh:'shell',yaml:'yaml',yml:'yaml'};
  editor.setOption('mode', modeMap[ext] || 'text/plain');
  editor.setValue(res.Data || '');
  editor.refresh();
  setTimeout(() => editor.refresh(), 100);
  document.getElementById('editor-panel').scrollIntoView({behavior:'smooth'});
}

async function saveFile() {
  if (!editor || !editorPath) return;
  const res = await Flashely.api('/update_file', {method:'POST', body:{path:editorPath, content:editor.getValue()}});
  Flashely.toast(res.Message||(res.Success?'Saved!':'Failed'), res.Success?'success':'error');
}

function closeEditor() {
  document.getElementById('editor-panel').classList.remove('open');
}

async function newFile() {
  const {value:name} = await Swal.fire({title:'New File',input:'text',inputPlaceholder:'filename.js',showCancelButton:true,confirmButtonText:'Create',background:'var(--s2)',color:'var(--fg)'});
  if (!name) return;
  const res = await Flashely.api('/create_file', {method:'POST', body:{path:curPath+'/'+name, content:''}});
  Flashely.toast(res.Message||(res.Success?'Created':'Failed'), res.Success?'success':'error');
  if (res.Success) { loadDir(); openFile(curPath+'/'+name, name); }
}

async function newFolder() {
  const {value:name} = await Swal.fire({title:'New Folder',input:'text',inputPlaceholder:'folder-name',showCancelButton:true,confirmButtonText:'Create',background:'var(--s2)',color:'var(--fg)'});
  if (!name) return;
  const res = await Flashely.api('/create_folder', {method:'POST', body:{path:curPath+'/'+name}});
  Flashely.toast(res.Message||(res.Success?'Created':'Failed'), res.Success?'success':'error');
  if (res.Success) loadDir();
}

async function renameItem(path, name) {
  const {value:newName} = await Swal.fire({title:'Rename',input:'text',inputValue:name,showCancelButton:true,confirmButtonText:'Rename',background:'var(--s2)',color:'var(--fg)'});
  if (!newName || newName === name) return;
  const newPath = path.replace(/\/[^/]+$/, '/'+newName);
  const res = await Flashely.api('/rename_dir', {method:'POST', body:{old_path:path, new_path:newPath}});
  Flashely.toast(res.Message||(res.Success?'Renamed':'Failed'), res.Success?'success':'error');
  if (res.Success) loadDir();
}

async function deleteItem(path, name) {
  const ok = await Flashely.confirm('Delete '+name+'?','This cannot be undone.','Delete',true);
  if (!ok) return;
  const res = await Flashely.api('/delete_path', {method:'POST', body:{data:[path]}});
  Flashely.toast(res.Message||(res.Success?'Deleted':'Failed'), res.Success?'success':'error');
  if (res.Success) loadDir();
}

async function deleteSelected() {
  const paths = [...selected];
  const ok = await Flashely.confirm(`Delete ${paths.length} item(s)?`,'This cannot be undone.','Delete',true);
  if (!ok) return;
  const res = await Flashely.api('/delete_path', {method:'POST', body:{data:paths}});
  Flashely.toast(res.Message||(res.Success?'Deleted':'Failed'), res.Success?'success':'error');
  if (res.Success) { selected.clear(); loadDir(); }
}

async function uploadFiles(files) {
  if (!files.length) return;
  const fd = new FormData();
  fd.append('path', curPath);
  for (const f of files) fd.append('files', f);
  try {
    const r = await fetch('/upload_file', {method:'POST', body:fd});
    const json = await r.json();
    Flashely.toast(json.Message||(json.Success?'Uploaded':'Failed'), json.Success?'success':'error');
    if (json.Success) loadDir();
  } catch(e) { Flashely.toast('Upload failed','error'); }
}

async function srvAction(action) {
  const res = await Flashely.api(`/${action}/${srvName}`, {method:'POST', body:{}});
  Flashely.toast(res.Message||(res.Success?`${action} sent`:'Failed'), res.Success?'success':'error');
}

loadDir();
</script>
</body>
</html>
